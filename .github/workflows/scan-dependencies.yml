name: Scan dependencies
on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  define-refs:
    runs-on: ubuntu-latest
    outputs:
      refs: ${{ steps.refs.outputs.refs }}
    steps:
      - id: refs
        run: |
          BRANCHES=($(gh api --cache 1h --paginate /repos/${{ github.repository }}/branches -q '.[] | .name | select(startswith("release"))' | sort -V -r))
          LATEST_REL_BRANCH=$(echo ${BRANCHES[0]} | sed 's|release/||') 
          TAGS=($(gh api --cache 1h /repos/${{ github.repository }}/tags --paginate -q ".[] | .name | select(startswith(\"$LATEST_REL_BRANCH\"))" | sort -V -r))
          LATEST_TAG=$(echo ${TAGS[0]}) 
          
          REFS='['
          FIRST=true
          for BRANCH in "${BRANCHES[@]}"; do
              if $FIRST; then
                  FIRST=false
              else
                  REFS+=", "
              fi
              REFS+="\"refs/heads/$BRANCH\""
          done

          REFS+=", \"refs/tags/$LATEST_TAG\""
          
          REFS+=']'

          echo "refs=$REFS" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  scan-dependencies:
    name: Scan dependencies
    runs-on: ubuntu-latest
    needs: define-refs
    permissions:
      contents: read
      security-events: write
    strategy:
      matrix:
        ref: ${{ fromJSON(needs.define-refs.outputs.refs) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ matrix.ref }}
      - name: Get head commit
        run: echo "CURRENT_SHA=$(git rev-parse HEAD)" >> $GITHUB_ENV
      - name: Trivy setup
        uses: aquasecurity/setup-trivy@v0.2.6
        with:
          cache: true
          version: v0.70.0 # There's an issue in v0.71.0 that makes it not work with Keycloak
      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '25'
          cache: 'maven'
      - name: Resolve Maven dependencies
        run: |
          ./mvnw dependency:tree -DskipTestsuite -DexcludeGroupIds=org.keycloak
      - name: Trivy scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'json'
          output: 'trivy-report.json'
          scanners: 'vuln'          
          skip-setup-trivy: true
          skip-version-check: true
      - name: Display report
        run: |
          ls
          echo "============================="
          cat trivy-report.json
          echo "============================="
          cat trivy-report.json | jq -r '[.Results[].Vulnerabilities[] | {VulnerabilityID: .VulnerabilityID, PkgName: .PkgName, InstalledVersion: .InstalledVersion, FixedVersion: .FixedVersion, Severity: .Severity}] | unique_by(.VulnerabilityID)'
      - name: Convert to sarif
        run: |
          trivy convert --format sarif -o trivy-report.sarif --scanners vuln trivy-report.json
      - name: Upload report
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: 'trivy-report.sarif'
          category: 'dependencies'
          ref: ${{ matrix.ref }}
          sha: ${{ env.CURRENT_SHA }}
