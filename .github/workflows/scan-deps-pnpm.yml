name: Scan dependencies
on:
  workflow_dispatch:

jobs:
  scan-dependencies:
    name: Scan dependencies
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    strategy:
      matrix:
        branch: [ "main", "release/26.4", "release/26.6" ]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ matrix.branch }}
      - name: Get head commit
        run: echo "CURRENT_SHA=$(git rev-parse HEAD)" >> $GITHUB_ENV
      - name: Trivy - Scan pnpm packages
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: 'fs'
          scan-ref: 'js/pnpm-lock.yaml'
          format: 'sarif'
          output: 'trivy-pnpm.sarif'
          scanners: 'vuln'
      - name: Trivy - Scan Java packages
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: 'fs'
          scan-ref: 'quarkus/deployment/pom.xml'
          format: 'sarif'
          output: 'trivy-java.sarif'
          scanners: 'vuln'          
      - name: Upload pnpm report
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-pnpm.sarif'
          category: 'trivy-pnpm'
          ref: refs/heads/${{ matrix.branch }}
          sha: ${{ env.CURRENT_SHA }}
      - name: Upload Java report
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-java.sarif'
          category: 'trivy-java'
          ref: refs/heads/${{ matrix.branch }}
          sha: ${{ env.CURRENT_SHA }}
      - name: Display pnpm report
        run: cat trivy-pnpm.sarif
      - name: Display Java report
        run: cat trivy-java.sarif
          
